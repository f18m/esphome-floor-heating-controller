esphome:
  name: floorheatingactuatorcontroller
  friendly_name: FloorHeatingActuatorController

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "I3R5Nv3wkiOT85A1hLs1PZZB3orL15TB9W6K6Jc9tmE="

ota:
  - platform: esphome
    password: "55feed1a933b5b324b482cf688b88ce9"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Optional manual IP
  manual_ip:
    static_ip: 192.168.1.96
    gateway: 192.168.1.254
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Floorheatingactuatorcontroller"
    password: "cxjpHijNRvL5"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP
      icon: mdi:ip-network-outline
    mac_address:
      name: MAC
      icon: mdi:network-outline

# Captive Portal is the portal created by this node when Wifi connection fails
captive_portal:
    
# Webserver is exposed under regular use
web_server:
  port: 80
  # Disable OTA updates for web_server only
  # Captive portal will still have OTA access since it auto-loads the web server OTA platform
  ota: false

# SPI bus configuration
# MOSI is not required because the slave device does not accept any input
#   SPI	MOSI    MISO    SCLK    CS
# VSPI	GPIO23	GPIO19	GPIO18	GPIO5
# HSPI	GPIO13	GPIO12	GPIO14	GPIO15
spi:
  miso_pin: GPIO16
  clk_pin: GPIO17

sensor:
  # Temperature sensor on SPI, see https://esphome.io/components/sensor/max6675/
  - platform: max6675
    name: "Heating pipe Temperature"
    cs_pin: GPIO15
    update_interval: 10s

  # WiFi information sensors
  - platform: wifi_signal
    name: Signal Strength
    update_interval: 60s

  - platform: dht
    pin: GPIO5
    model: DHT11
    temperature:
      name: "Ambient Temperature"
    humidity:
      name: "Ambient Humidity"
    update_interval: 10s

switch:
  # relays use GPIOS 12-14, 23,25-27, 32-33
  - platform: gpio
    name: "LED"
    pin: GPIO23
  - platform: gpio
    name: "Relay1"
    pin: GPIO13
  - platform: gpio
    name: "Relay2"
    pin: GPIO12
  - platform: gpio
    name: "Relay3"
    pin: GPIO14
  - platform: gpio
    name: "Relay4"
    pin: GPIO27
  - platform: gpio
    name: "Relay5"
    pin: GPIO26
  - platform: gpio
    name: "Relay6"
    pin: GPIO25
  - platform: gpio
    name: "Relay7"
    pin: GPIO33
  - platform: gpio
    name: "Relay8"
    pin: GPIO32
